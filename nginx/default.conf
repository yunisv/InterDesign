limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=perip:10m;
limit_req_status 429;
limit_conn_status 429;

map $http_user_agent $bad_bot {
    default 0;
    ~*(?i)(ahrefsbot|mj12bot|semrushbot|dotbot|petalbot|bytespider|serpstatbot|blexbot|megaindex|dataforseobot|barkrowler|zoominfobot) 1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    access_log /var/log/nginx/access.log;

    # baseline flood protection: cap requests/connections per IP
    limit_req zone=general burst=30 nodelay;
    limit_conn perip 20;

    # drop known aggressive scraper/SEO bots outright
    if ($bad_bot) {
        return 403;
    }

    # common exploit/credential-scan probes get an instant 404, never reach the app
    location ~* /(\.env|\.git|wp-login\.php|wp-admin|xmlrpc\.php|phpmyadmin|\.htaccess) {
        return 404;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
