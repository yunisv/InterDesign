services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: interdesign
      POSTGRES_USER: interdesign
      POSTGRES_PASSWORD: interdesign
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interdesign"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://interdesign:interdesign@db:5432/interdesign
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  nginx:
    image: owasp/modsecurity-crs:4.25-nginx-lts
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      BACKEND: "http://frontend:3000"
      PARANOIA: "1"
      BLOCKING_PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      # Start in log-only mode. Watch nginx/logs/modsec_audit.log (or
      # `docker compose logs nginx`) for false positives on login/upload/
      # contact-form traffic for a bit, THEN switch this to "On" to
      # actually start blocking.
      MODSEC_RULE_ENGINE: "DetectionOnly"
    volumes:
      - ./nginx/default.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:8080"
    healthcheck:
      disable: true

volumes:
  pgdata:
  uploads:
